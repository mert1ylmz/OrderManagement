services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123*
    ports:
      - "1433:1433"

  orderapi:
    build:
      context: .
      dockerfile: src/OrderService.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "7000:8080"
    depends_on:
      - sqlserver

  reportingapi:
    build:
      context: .
      dockerfile: src/ReportingService.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "7001:8080"
    depends_on:
      - sqlserver